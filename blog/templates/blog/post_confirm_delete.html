{% extends 'blog/base.html' %}

{% block title %}投稿を削除 - マイブログ{% endblock %}

{% block content %}
<h1 class="mb-4">投稿を削除</h1>
<div class="alert alert-danger">
    <p>本当に「{{ post.title }}」を削除しますか？</p>
</div>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">削除する</button>
    <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">キャンセル</a>
</form>
{% endblock %}
